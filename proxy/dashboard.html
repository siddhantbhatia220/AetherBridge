<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherBridge Shadow Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #141417;
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --text: #e0e0e6;
            --text-dim: #a0a0aa;
            --success: #00e676;
            --warning: #ffab40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .navbar {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #b388ff);
            border-radius: 8px;
            display: grid;
            place-items: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .status-badge {
            padding: 0.5rem 1rem;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.2);
            color: var(--success);
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .log-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .method {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .log-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item {
            margin-bottom: 1.5rem;
        }

        .sidebar-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            display: block;
        }

        .stat {
            font-size: 2rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .json-preview {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }

        .active .json-preview {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">A</div>
            AetherBridge <span style="color: var(--text-dim); font-weight: 300;">Shadow</span>
        </div>
        <div class="status-badge">
            <div class="pulse"></div>
            Kernel Active
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="card-title">Live Interceptor</div>
                <div id="log-container" class="log-list">
                    <div class="empty-state">Waiting for requests...</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="card sidebar-item">
                    <span class="sidebar-label">Active Requests</span>
                    <div class="stat" id="stat-total">0</div>
                </div>
                <div class="card sidebar-item">
                    <span class="sidebar-label">Active Adapters</span>
                    <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem;">
                        <span style="padding: 4px 10px; background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.2); border-radius: 4px; font-size: 0.75rem;">Auth</span>
                        <span style="padding: 4px 10px; background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.2); border-radius: 4px; font-size: 0.75rem;">Pay</span>
                        <span style="padding: 4px 10px; background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.2); border-radius: 4px; font-size: 0.75rem;">Storage</span>
                        <span style="padding: 4px 10px; background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.2); border-radius: 4px; font-size: 0.75rem;">AI</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastId = -1;

        async function fetchLogs() {
            try {
                const res = await fetch('/logs');
                const logs = await res.json();
                
                const container = document.getElementById('log-container');
                const totalStat = document.getElementById('stat-total');
                
                if (logs.length > 0) {
                    totalStat.innerText = logs.length;
                    
                    if (logs[0].id !== lastId) {
                        lastId = logs[0].id;
                        renderLogs(logs);
                    }
                }
            } catch (e) {
                console.error("Dashboard failed to poll:", e);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.onclick = () => item.classList.toggle('active');
                
                const date = new Date(log.timestamp).toLocaleTimeString();
                
                item.innerHTML = `
                    <div class="log-header">
                        <span class="method">${log.method}</span>
                        <span class="timestamp">${date}</span>
                    </div>
                    <div class="log-body">${log.data}</div>
                    <div class="json-preview">
                        <pre>${JSON.stringify(JSON.parse(log.data), null, 2)}</pre>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        setInterval(fetchLogs, 1000);
        fetchLogs();
    </script>
</body>
</html>
